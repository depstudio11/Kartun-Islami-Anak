<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atep Depstudio Official</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: #ff0000;
      padding: 15px;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .video-section {
      margin: 25px auto;
      max-width: 900px;
    }
    iframe {
      width: 100%;
      height: 500px;
      border-radius: 12px;
    }
    .btn {
      display: inline-block;
      background: #ff0000;
      padding: 12px 25px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      margin-top: 18px;
    }
    footer {
      margin-top: 45px;
      padding: 20px;
      background: #000;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <header>Atep Depstudio 🎬</header>

  <h2>Video Terbaru dari Channel YouTube</h2>
  <div class="video-section">
    <!-- Embed video terbaru -->
    <iframe src="https://www.youtube.com/embed/ltrkVZqEGlg"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>
  </div>

  <a class="btn" href="https://youtube.com/@atepdepstudio" target="_blank">
    Kunjungi Channel YouTube ▶
  </a>

  <footer>
    © 2025 Atep Depstudio — Website ini otomatis menampilkan video terbaru dari channel YouTube.
  </footer>

</body>
</html>
